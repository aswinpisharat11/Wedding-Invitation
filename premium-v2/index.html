<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Beginning | Aswin ❤️ Megha</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d8e1cf;
font-family:Georgia,serif;
overflow:hidden;
}

#opening{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#d8e1cf;
}

/* Envelope */

.envelope{
width:560px;
height:380px;
max-width:92vw;
background:#a8b99a;
border-radius:14px;
position:relative;
overflow:hidden;
box-shadow:0 25px 50px rgba(0,0,0,.25);
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:280px solid transparent;
border-right:280px solid transparent;
border-top:190px solid #93a484;
transform-origin:top;
transition:1.3s;
z-index:5;
}

.open .flap{
transform:rotateX(180deg);
}

/* Seal */

.seal{
position:absolute;
left:50%;
top:48%;
transform:translate(-50%,-50%);
width:78px;
height:78px;
border-radius:50%;
background:linear-gradient(145deg,#e4c267,#b88a2d);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:white;
cursor:pointer;
z-index:10;
border:3px solid rgba(255,255,255,.35);
box-shadow:0 6px 18px rgba(0,0,0,.25);
}

/* Title */

.invite-label{
margin-top:35px;
font-size:42px;
font-style:italic;
letter-spacing:4px;
color:#d4af37;
text-shadow:0 4px 10px rgba(0,0,0,.25);
}

@media(max-width:600px){

.envelope{
width:340px;
height:240px;
}

.flap{
border-left:170px solid transparent;
border-right:170px solid transparent;
border-top:120px solid #93a484;
}

.seal{
width:60px;
height:60px;
font-size:18px;
}

.invite-label{
font-size:26px;
}

}

</style>
</head>

<body>

<div id="opening">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="seal" id="seal">
A M
</div>

</div>

<div class="invite-label">
Wedding Invitation
</div>

</div>

</body>
</html>
