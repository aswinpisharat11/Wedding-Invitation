<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Beginning | Aswin ❤️ Megha</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d8e1cf;
font-family:Georgia,serif;
overflow:hidden;
}

/* Opening Screen */

#opening{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#d8e1cf;
}

/* Envelope */

.envelope{
width:700px;
height:470px;
max-width:94vw;
background:#a8b99a;
border-radius:16px;
position:relative;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.30);
}

/* Top Flap */

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:350px solid transparent;
border-right:350px solid transparent;
border-top:235px solid #93a484;
transform-origin:top;
transition:1.3s;
z-index:5;
}

/* Seal */

.seal{
position:absolute;
left:50%;
top:38%;
transform:translate(-50%,-50%);
width:95px;
height:95px;
border-radius:50%;
background:linear-gradient(145deg,#e4c267,#b88a2d);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
color:white;
cursor:pointer;
z-index:20;
border:4px solid rgba(255,255,255,.40);
box-shadow:0 8px 20px rgba(0,0,0,.30);
}

/* Invitation Text */

.invite-label{
margin-top:45px;
font-family:Georgia,serif;
font-size:58px;
font-style:italic;
font-weight:bold;
letter-spacing:4px;
color:#d4af37;
text-shadow:0 5px 12px rgba(0,0,0,.25);
}

/* Mobile */

@media(max-width:600px){

.envelope{
width:360px;
height:250px;
}

.flap{
border-left:180px solid transparent;
border-right:180px solid transparent;
border-top:125px solid #93a484;
}

.seal{
width:72px;
height:72px;
font-size:20px;
}

.invite-label{
font-size:34px;
text-align:center;
padding:0 15px;
}

}

</style>
</head>

<body>

<div id="opening">

<div class="envelope">

<div class="flap"></div>

<div class="seal">
A M
</div>

</div>

<div class="invite-label">
Wedding Invitation
</div>

</div>

</body>
</html>
