<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Beginning | Aswin ❤️ Megha</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,serif;
background:#d8e1cf;
overflow:hidden;
}

#opening{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#d8e1cf;
position:relative;
}

.envelope{
width:390px;
height:270px;
max-width:90vw;
background:#a8b99a;
position:relative;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
overflow:hidden;
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:195px solid transparent;
border-right:195px solid transparent;
border-top:135px solid #93a484;
transform-origin:top;
transition:1.2s;
z-index:5;
}

.seal{
position:absolute;
width:54px;
height:54px;
background:linear-gradient(145deg,#e4c267,#b88a2d);
border-radius:50%;
bottom:18px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:13px;
font-weight:bold;
cursor:pointer;
z-index:10;
border:2px solid rgba(255,255,255,.35);
box-shadow:0 4px 14px rgba(0,0,0,.25);
transition:.5s;
}

.invite-label{
margin-top:30px;
font-size:28px;
font-style:italic;
color:#d4af37;
letter-spacing:1px;
text-shadow:0 2px 8px rgba(0,0,0,.2);
}

.open .flap{
transform:rotateX(180deg);
}

@media(max-width:600px){

.envelope{
width:320px;
height:230px;
}

.flap{
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:115px solid #93a484;
}

.invite-label{
font-size:22px;
}

}

</style>
</head>

<body>

<div id="opening">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="seal" id="seal">
A M
</div>

</div>

<div class="invite-label">
Wedding Invitation
</div>

</div>

</body>
</html>
