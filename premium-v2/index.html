uu<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Beginning | Aswin ❤️ Megha</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#d8e1cf;
font-family:Georgia,serif;
overflow:hidden;
}

/* Opening Screen */

#opening{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#d8e1cf;
}

/* Envelope */

.envelope{
width:700px;
height:470px;
max-width:94vw;
background:#a8b99a;
border-radius:16px;
position:relative;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.30);
}

/* Top Flap */
  .flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:350px solid transparent;
border-right:350px solid transparent;
border-top:235px solid #93a484;
transform-origin:top;
transition:1.3s;
z-index:5;
}

/* ADD THIS HERE */

.open .flap{
transform:rotateX(180deg);
}

/* THEN CONTINUE WITH */

.seal{
position:absolute;
left:50%;
top:38%;
transform:translate(-50%,-50%);
width:95px;
height:95px;
...
}

/* Seal */

.seal{
position:absolute;
left:50%;
top:38%;
transform:translate(-50%,-50%);
width:95px;
height:95px;
border-radius:50%;
background:linear-gradient(145deg,#e4c267,#b88a2d);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
color:white;
cursor:pointer;
z-index:20;
border:4px solid rgba(255,255,255,.40);
box-shadow:0 8px 20px rgba(0,0,0,.30);
}

/* Invitation Text */

.invite-label{
margin-top:45px;
font-family:Georgia,serif;
font-size:58px;
font-style:italic;
font-weight:bold;
letter-spacing:4px;
color:#d4af37;
text-shadow:0 5px 12px rgba(0,0,0,.25);
}

/* Mobile */

@media(max-width:600px){

.envelope{
width:360px;
height:250px;
}

.flap{
border-left:180px solid transparent;
border-right:180px solid transparent;
border-top:125px solid #93a484;
}

.seal{
width:72px;
height:72px;
font-size:20px;
}

.invite-label{
font-size:34px;
text-align:center;
padding:0 15px;
}

}
/* Letter Page */

#letterPage{
position:fixed;
top:100%;
left:0;
width:100%;
height:100%;
background:#d8e1cf;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
transition:1.8s;
z-index:100;
}

.letter-content{
max-width:1000px;
}

.letter-content h1{
font-size:80px;
color:#28402b;
margin-bottom:25px;
}

.gold-line{
width:180px;
height:2px;
background:#b88a2d;
margin:25px auto;
}

.letter-content h2{
font-size:58px;
color:#5c3a21;
margin-bottom:35px;
}

.letter-content p{
font-size:36px;
line-height:1.8;
color:#2f3c30;
}

@media(max-width:600px){

.letter-content h1{
font-size:44px;
}

.letter-content h2{
font-size:32px;
}

.letter-content p{
font-size:22px;
}

}
  #heroPhoto{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 2.5s ease;
z-index:1;
}

#heroPhoto.show{
opacity:1;
}

.letter-content{
position:relative;
z-index:5;
}
  .letter-content::before{
content:"";
position:absolute;
inset:-30px;
background:rgba(0,0,0,.30);
backdrop-filter:blur(8px);
border-radius:30px;
z-index:-1;
opacity:1;
transition:2.5s;
}

.fade-box::before{
opacity:0;
background:transparent;
backdrop-filter:blur(0px);
}
</style>
</head>

<body>

<div id="opening">

<div class="envelope">

<div class="flap"></div>

<div class="seal">
A M
</div>

</div>

<div class="invite-label">
Wedding Invitation
</div>

</div>
<button id="musicBtn">
🔊 Music
</button>

<audio id="bgMusic" loop>
<source src="../music/reelaudio-70084_rWPASEbu.mp3" type="audio/mpeg">
</audio>
</body>
  <div id="letterPage">
<img
id="heroPhoto"
src="https://raw.githubusercontent.com/aswinpisharat11/Wedding-Invitation/main/images/file_000000000dc47208a34ae8fe0d8e63e8.png"
alt="Aswin and Megha">
<div class="letter-content">

<h1>Forever Beginning</h1>

<div class="gold-line"></div>

<h2>Aswin ❤️ Megha</h2>

<p>
Together with our families,<br><br>

we joyfully invite you to celebrate our wedding
and bless us as we begin this beautiful journey together.
</p>

</div>

</div>
  <script>

const seal=document.querySelector(".seal");
    const music=document.getElementById("bgMusic");
    const musicBtn=document.getElementById("musicBtn");
const envelope=document.querySelector(".envelope");
const letter=document.getElementById("letterPage");

seal.addEventListener("click",()=>{

seal.style.opacity="0";

envelope.classList.add("open");

setTimeout(()=>{
letter.style.top="0";

setTimeout(()=>{

document
.getElementById("heroPhoto")
.classList.add("show");
document
.querySelector(".letter-content")
.classList.add("fade-box");
},3000);
  
music.play().catch(()=>{});
},1200);

});
    musicBtn.style.display="block";

</script>
</html>
